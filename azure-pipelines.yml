# Push to GitHub -> Azure DevOps builds, tests, pushes to ACR, deploys to ACA.
trigger:
  branches:
    include: [main]

variables:
  acr: warroomacryus4r3t5b66pu
  image: harness-war-room
  shopImage: shop-api
  rg: rg-harness-war-room
  app: warroom
  shop: warroom-shop
  azureSubscription: warroom-azure

stages:
  - stage: Test
    jobs:
      - job: pytest
        pool: { vmImage: ubuntu-latest }
        steps:
          - task: UsePythonVersion@0
            inputs: { versionSpec: '3.11' }
          - script: pip install -r requirements.txt && pytest backend/tests -q
            displayName: Run tests

  - stage: BuildPush
    dependsOn: Test
    jobs:
      - job: image
        pool: { vmImage: ubuntu-latest }
        steps:
          - task: AzureCLI@2
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr build --registry $(acr) --image $(image):$(Build.BuildId) .
                az acr build --registry $(acr) --image $(shopImage):$(Build.BuildId) -f shop-api/Dockerfile .

  - stage: Deploy
    dependsOn: BuildPush
    jobs:
      - job: aca
        pool: { vmImage: ubuntu-latest }
        steps:
          - task: AzureCLI@2
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp update -n $(app) -g $(rg) \
                  --image $(acr).azurecr.io/$(image):$(Build.BuildId)
                az containerapp update -n $(shop) -g $(rg) \
                  --image $(acr).azurecr.io/$(shopImage):$(Build.BuildId)

  - stage: Durable
    dependsOn: Deploy
    jobs:
      - job: publish
        pool: { vmImage: ubuntu-latest }
        steps:
          - task: UsePythonVersion@0
            inputs: { versionSpec: '3.11' }
          - script: |
              cp -r backend durable/backend
              cp -r demo_repo durable/demo_repo
              npm i -g azure-functions-core-tools@4 --unsafe-perm true
            displayName: Stage durable package
          - task: AzureCLI@2
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cd durable
                func azure functionapp publish warroom-fn --python
